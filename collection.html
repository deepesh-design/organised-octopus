<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Collection — Organised Octopus</title>

<link rel="stylesheet" href="_ds/organied-octopus-design-system-10b7e1d5-d6c5-41e6-9c65-474afbb5749c/tokens/fonts.css">
<link rel="stylesheet" href="_ds/organied-octopus-design-system-10b7e1d5-d6c5-41e6-9c65-474afbb5749c/tokens/colors.css">
<link rel="stylesheet" href="_ds/organied-octopus-design-system-10b7e1d5-d6c5-41e6-9c65-474afbb5749c/tokens/typography.css">
<link rel="stylesheet" href="_ds/organied-octopus-design-system-10b7e1d5-d6c5-41e6-9c65-474afbb5749c/tokens/spacing.css">
<link rel="stylesheet" href="_ds/organied-octopus-design-system-10b7e1d5-d6c5-41e6-9c65-474afbb5749c/tokens/effects.css">
<link rel="stylesheet" href="_ds/organied-octopus-design-system-10b7e1d5-d6c5-41e6-9c65-474afbb5749c/base.css">
<link rel="stylesheet" href="_ds/organied-octopus-design-system-10b7e1d5-d6c5-41e6-9c65-474afbb5749c/styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/organied-octopus-design-system-10b7e1d5-d6c5-41e6-9c65-474afbb5749c/_ds_bundle.js"></script>

<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  * { box-sizing: border-box; }
  a { color: var(--link-default); }
  a:hover { color: var(--link-hover); }
  /* hover label slide-swap: current label slides up+out, duplicate slides in from below */
  .r-hov { position: relative; display: inline-block; overflow: hidden; vertical-align: top; }
  .r-hov-ph { visibility: hidden; }
  .r-hov-a, .r-hov-b { position: absolute; top: 0; left: 0; width: 100%; transition: transform .45s cubic-bezier(.65,0,.35,1); }
  .r-hov-b { top: 100%; }
  .r-hovable:hover .r-hov-a, .r-hovable:hover .r-hov-b { transform: translateY(-100%); }
  .sort-toggle {
    display: flex; align-items: center; gap: 8px; background: none; border: none;
    border-bottom: 1px solid var(--oo-black); padding: 6px 0; cursor: pointer;
    font-family: var(--font-sans); font-size: var(--text-body); font-weight: 500;
    letter-spacing: var(--tracking-tight); color: var(--text-primary);
  }
  .sort-option {
    display: block; width: 100%; text-align: left; padding: 12px 16px; border: none; cursor: pointer;
    font-family: var(--font-sans); font-size: var(--text-body); font-weight: 500; letter-spacing: var(--tracking-tight);
    border-bottom: 1px solid var(--border-hairline);
  }
  .sort-option:last-child { border-bottom: none; }

  @media (max-width: 767px) {
    .r-big { font-size: var(--text-hero-mobile) !important; }
    #product-grid { grid-template-columns: repeat(1, 1fr) !important; padding: 0 !important; }
    .filterbar { flex-direction: column !important; align-items: stretch !important; gap: 20px !important; padding: 32px 0 16px !important; }
    .cat-pills { gap: 16px !important; }
    .sort-dropdown { align-self: flex-start; }
    .sort-dropdown .sort-menu { left: 0 !important; right: auto !important; width: 220px; }
    .r-loading-img { width: 100px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { SiteHeader, MenuOverlay, SiteFooter, ShopButton, ProductThumb } = window.OrganiedOctopusDesignSystem_10b7e1;

const CDN = 'https://cdn.prod.website-files.com/67a7721e638cc64a55110750/';
const CDN2 = 'https://cdn.prod.website-files.com/67a766fea7b4c145250bc504/';

const LOADING_IMAGES = ['assets/loading/luno-sofa-yellow.webp', 'assets/loading/arco-shelf-metal.webp', 'assets/loading/arco-stool-metal.webp', 'assets/loading/arco-sofa-metal.webp', 'assets/loading/luno-stool-blue.webp', 'assets/loading/luno-shelf-red.webp', 'assets/loading/vera-sofa-blue.webp', 'assets/loading/luno-hero-thumb.webp'];

const PRODUCTS = [
  { id: 'ripple-vase',    name: 'Ripple Vase',    cat: 'Vases',      price: 68,  added: 8, img: CDN2 + '67ae0685ff1f5c71d6d11da5_1.webp', imgHover: CDN + '67b1d61e5c80ce0e3e4394c1_3-2.webp', badge: 'New' },
  { id: 'hollow-vase',    name: 'Hollow Vase',    cat: 'Vases',      price: 54,  added: 3, img: CDN + '67ad96ab106d8fb7eb7c1eab_1.webp', imgHover: CDN + '67b1d5f084a678ab1b0efec3_6-2.webp' },
  { id: 'arc-lamp',       name: 'Arc Lamp',       cat: 'Lamps',      price: 120, added: 7, img: CDN + '67ad9b7fdaa7aa4b594f62f4_5.webp', imgHover: CDN + '67b1d5c63fcfacb48ae7341d_9-2.webp', badge: 'Featured' },
  { id: 'nest-lamp',      name: 'Nest Lamp',      cat: 'Lamps',      price: 95,  added: 2, img: CDN + '67ad9b4f3bd234953e76f057_4.webp', imgHover: CDN + '67b1d61e5c80ce0e3e4394c1_3-2.webp' },
  { id: 'coral-tray',     name: 'Coral Tray',     cat: 'Organising', price: 42,  added: 6, img: CDN + '67ad9ba0de7bb305ceaf65f5_6.webp', imgHover: CDN + '67b1d5f084a678ab1b0efec3_6-2.webp', badge: 'On sale' },
  { id: 'loop-catchall',  name: 'Loop Catch-all', cat: 'Organising', price: 36,  added: 1, img: CDN + '67ad9c39d7574971aad10695_9.webp', imgHover: CDN + '67b1d5c63fcfacb48ae7341d_9-2.webp' },
  { id: 'strand-bookend', name: 'Strand Bookend', cat: 'Decor',      price: 58,  added: 5, img: CDN + '67ad96dcb08629ee808e5994_2.webp', imgHover: CDN + '67b1d61e5c80ce0e3e4394c1_3-2.webp' },
  { id: 'drift-bowl',     name: 'Drift Bowl',     cat: 'Decor',      price: 48,  added: 4, img: CDN + '67ad9afb0cd024e19c7378f8_3.webp', imgHover: CDN + '67b1d5f084a678ab1b0efec3_6-2.webp', badge: 'New' },
];

const CATEGORIES = ['Vases', 'Lamps', 'Organising', 'Decor'];

function money(n) {
  return '\u20b9 ' + n.toLocaleString('en-IN');
}

function sortProducts(list, sortVal) {
  const arr = list.slice();
  arr.sort((a, b) => {
    switch (sortVal) {
      case 'price-asc': return a.price - b.price;
      case 'price-desc': return b.price - a.price;
      case 'name-asc': return a.name.localeCompare(b.name);
      default: return b.added - a.added; // newest
    }
  });
  return arr;
}

function ChevronIcon({ open }) {
  return (
    <svg width="12" height="8" viewBox="0 0 12 8" style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform var(--duration-fast) ease', flexShrink: 0 }}>
      <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="square" />
    </svg>
  );
}

const SORT_OPTIONS = [
  { value: 'newest', label: 'Newest' },
  { value: 'price-asc', label: 'Price: low\u2013high' },
  { value: 'price-desc', label: 'Price: high\u2013low' },
  { value: 'name-asc', label: 'Name A\u2013Z' },
];

function SwapLabel({ text }) {
  return (
    <span className="r-hov">
      <span className="r-hov-ph">{text}</span>
      <span className="r-hov-a">{text}</span>
      <span className="r-hov-b" aria-hidden="true">{text}</span>
    </span>
  );
}

function SortDropdown({ value, onChange }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const current = SORT_OPTIONS.find(o => o.value === value) || SORT_OPTIONS[0];

  React.useEffect(() => {
    function onDocClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, []);

  return (
    <div className="sort-dropdown" ref={ref} style={{ position: 'relative' }}>
      <button type="button" className="sort-toggle r-hovable" onClick={() => setOpen(o => !o)} aria-haspopup="listbox" aria-expanded={open}>
        <SwapLabel text={current.label} />
        <ChevronIcon open={open} />
      </button>
      {open && (
        <div className="sort-menu" role="listbox" style={{
          position: 'absolute', top: 'calc(100% + 8px)', right: 0, zIndex: 10,
          background: 'var(--surface-page)', border: '1px solid var(--border-hairline)', minWidth: 220,
        }}>
          {SORT_OPTIONS.map(o => (
            <button
              key={o.value}
              type="button"
              role="option"
              aria-selected={o.value === value}
              className="sort-option r-hovable"
              onClick={() => { onChange(o.value); setOpen(false); }}
              style={{ background: o.value === value ? 'var(--oo-black)' : 'transparent', color: o.value === value ? 'var(--oo-white)' : 'var(--text-primary)' }}
            ><SwapLabel text={o.label} /></button>
          ))}
        </div>
      )}
    </div>
  );
}

function Badge({ text }) {
  return (
    <span style={{
      position: 'absolute', top: 8, left: 8, zIndex: 2,
      background: 'var(--oo-black)', color: 'var(--oo-white)',
      fontFamily: 'var(--font-sans)', fontSize: 12, fontWeight: 500,
      letterSpacing: '0.02em', textTransform: 'uppercase', padding: '4px 8px',
    }}>{text}</span>
  );
}

function ProductTile({ p }) {
  const [hover, setHover] = React.useState(false);
  const src = (hover && p.imgHover) ? p.imgHover : p.img;
  return (
    <div onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}>
      <div style={{ position: 'relative' }}>
        <ProductThumb src={src} alt={p.name} name={p.name} width="100%" />
        {p.badge ? <Badge text={p.badge} /> : null}
      </div>
      <ShopButton label="Shop on Amazon" value={money(p.price)} />
    </div>
  );
}

function LoadingScreen({ visible }) {
  const loadingImg = React.useMemo(() => LOADING_IMAGES[Math.floor(Math.random() * LOADING_IMAGES.length)], []);
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 100, background: 'var(--surface-page)', color: 'var(--text-primary)', padding: 16,
      transform: visible ? 'translateY(0%)' : 'translateY(-100%)',
      transition: 'transform 1s cubic-bezier(.77,0,.18,1)',
    }}>
      <img className="r-loading-img" src={loadingImg} alt="" style={{ position: 'absolute', top: 16, left: 16, width: 160, aspectRatio: '2/2.6', objectFit: 'cover' }} />
      <img src="assets/loading-icon.svg" alt="Organised Octopus" style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', width: 180, display: 'block' }} />
      <p style={{ position: 'absolute', bottom: 16, right: 16, fontSize: 'var(--text-loading)', fontWeight: 500, lineHeight: 'var(--text-loading-line)', letterSpacing: 'var(--tracking-normal)', margin: 0, maxWidth: 380, textAlign: 'right' }}>
        Your home called. It wants art. We design material-driven, minimalist furniture inspired by Swiss graphic design.
      </p>
    </div>
  );
}

function Page() {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [cat, setCat] = React.useState('all');
  const [sort, setSort] = React.useState('newest');
  const [loading, setLoading] = React.useState(true);
  const [loadingDone, setLoadingDone] = React.useState(false);
  const footerRef = React.useRef(null);
  const spacerRef = React.useRef(null);

  React.useEffect(() => {
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    let timers = [];
    function startReveal() {
      timers.push(setTimeout(() => {
        setLoading(false);
        document.documentElement.style.overflow = '';
        document.body.style.overflow = '';
      }, 700));
      timers.push(setTimeout(() => setLoadingDone(true), 1900));
    }
    // preload the loading-screen icon so it never flashes in blank —
    // only start the reveal countdown once it's actually ready to paint
    const icon = new Image();
    icon.src = 'assets/loading-icon.svg';
    if (icon.complete) {
      startReveal();
    } else {
      icon.onload = startReveal;
      icon.onerror = startReveal;
      timers.push(setTimeout(startReveal, 1200)); // fallback if load never fires
    }
    return () => { timers.forEach(clearTimeout); };
  }, []);

  React.useEffect(() => {
    function resize() {
      if (footerRef.current && spacerRef.current) {
        spacerRef.current.style.height = footerRef.current.offsetHeight + 'px';
      }
    }
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('load', resize);
    const imgs = footerRef.current ? footerRef.current.querySelectorAll('img') : [];
    imgs.forEach(img => { if (!img.complete) img.addEventListener('load', resize, { once: true }); });
    const t = setTimeout(resize, 600);
    return () => { window.removeEventListener('resize', resize); window.removeEventListener('load', resize); clearTimeout(t); };
  }, []);

  const filtered = cat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.cat === cat);
  const sorted = sortProducts(filtered, sort);

  return (
    <div style={{ position: 'relative', fontFamily: 'var(--font-sans)', color: 'var(--text-primary)', letterSpacing: 'var(--tracking-tight)', WebkitFontSmoothing: 'antialiased', overflowX: 'clip' }}>
      {!loadingDone && <LoadingScreen visible={loading} />}

      <div style={{ position: 'relative', zIndex: 1, background: 'var(--surface-page)' }}>
      <SiteHeader logoSrc="icon-black-mrdekrfj.svg" menuOpen={menuOpen} onToggleMenu={() => setMenuOpen(o => !o)} homeHref="./" />

      <div style={{ padding: '140px 16px 120px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(12,1fr)', gap: 16 }}>
          <h1 className="r-big" style={{ gridColumn: '1 / 13', fontSize: 'var(--text-hero)', lineHeight: 'var(--text-hero-line)', fontWeight: 500, letterSpacing: 'var(--tracking-tight)', margin: 0 }}>
            Collection
          </h1>
        </div>

        <div className="filterbar" style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '32px 16px 16px', borderBottom: '1px solid var(--border-hairline)', margin: '0 0 32px',
        }}>
          <div className="cat-pills" style={{ display: 'flex', gap: 24, flexWrap: 'wrap' }}>
            {['all', ...CATEGORIES].map(c => (
              <button
                key={c}
                onClick={() => setCat(c)}
                className="r-hovable"
                style={{
                  background: 'none', border: 'none', fontFamily: 'inherit', fontSize: 'var(--text-body)',
                  fontWeight: 500, letterSpacing: 'var(--tracking-tight)', padding: 0, cursor: 'pointer',
                  color: cat === c ? 'var(--text-primary)' : 'var(--text-disabled)',
                }}
              ><SwapLabel text={c === 'all' ? 'All' : c} /></button>
            ))}
          </div>
          <SortDropdown value={sort} onChange={setSort} />
        </div>

        <div id="product-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '24px 16px', padding: '0 16px' }}>
          {sorted.map(p => <ProductTile key={p.id} p={p} />)}
        </div>
      </div>
      </div>

      <div ref={spacerRef} style={{ width: '100%' }}></div>

      <div ref={footerRef} style={{ position: 'fixed', left: 0, right: 0, bottom: 0, zIndex: 0 }}>
        <SiteFooter
          logoSrc="octopus-white-mrdelehg.svg"
          copyright="© 2025 Organised Octopus"
          columns={[
            { span: '1 / 4', links: [{ label: 'Home', href: './' }, { label: 'Collection', href: './collection' }, { label: 'About', href: './about' }] },
            { span: '4 / 7', links: [{ label: 'Instagram' }, { label: 'Email' }] },
          ]}
        />
      </div>

      <MenuOverlay
        open={menuOpen}
        onClose={() => setMenuOpen(false)}
        links={[
          { label: 'Home', href: './' },
          { label: 'Collection', href: './collection' },
          { label: 'About', href: './about' },
        ]}
        description="Your home called. It wants art. We design material-driven, minimalist furniture inspired by Swiss graphic design."
        social={[{ label: 'Instagram', href: '#' }, { label: 'Email', href: '#' }]}
        copyright="© 2025 Organised Octopus"
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
